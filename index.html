<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamX</title>
    
    <!-- CSS Section (Blogger tags removed) -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0f0f13; color: white; }
        .header { background: #1a1a24; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 20px; font-weight: bold; color: #ff3b30; }
        .online-count { font-size: 12px; color: #00e676; display: flex; align-items: center; gap: 5px; }
        .search-box { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #333; background: #0f0f13; color: white; outline: none; }
        .search-box:focus { border-color: #ff3b30; }
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; background: #0f0f13; border-bottom: 1px solid #222; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { background: #222; border: 1px solid #333; color: white; padding: 6px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; }
        .cat-btn.active { background: #ff3b30; border-color: #ff3b30; font-weight: bold; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .video-card { background: #1a1a24; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.2s;}
        .video-card:hover { border-color: #ff3b30; }
        .thumb-container { position: relative; width: 100%; height: 180px; background: #000; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .locked-badge { position: absolute; top: 10px; right: 10px; background: rgba(243, 156, 18, 0.9); padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .card-info { padding: 12px; }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .card-stats { display: flex; gap: 12px; font-size: 12px; color: #aaa; }
        #player-view { display: none; background: #0f0f13; min-height: 100vh; }
        .back-btn { padding: 15px; font-size: 16px; cursor: pointer; background: #1a1a24; border-bottom: 1px solid #333; color: white; }
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .player-container { width: 100%; height: 100%; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .ad-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; flex-direction: column; justify-content: center; align-items: center; }
        .ad-box { background: #1a1a24; padding: 20px; border-radius: 10px; text-align: center; border: 2px solid #ff3b30; }
        .ad-box h3 { color: white; margin-bottom: 10px; }
        .ad-box p { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        .ad-box button { background: #ff3b30; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .video-details { padding: 15px; }
        .title-row { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .stats-row { color: gray; font-size: 13px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .action-btn { background: #222; border: none; color: white; padding: 10px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; flex: 1;}
        .unlock-btn { background: #f39c12; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; }
        .unlock-btn:disabled { background: #555; cursor: not-allowed; }
    </style>

    <!-- Firebase CDN (Self-closing tags fixed) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Monetag SDK -->
    <script data-sdk="show_11167129" data-zone="11167129" src="//libtl.com/sdk.js"></script>
  
    <!-- TELEGRAM WEB APP SCRIPT -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Adsgram Script -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>

    <!-- ================= HOME VIEW ================= -->
    <div id="home-view">
        <div class="header">
            <div class="top-bar">
                <div class="logo" id="siteLogo">StreamX</div>
                <div class="online-count">🔴 <span id="liveUsers">0</span> Online</div>
            </div>
            <input class="search-box" id="searchInput" oninput="filterVideos()" placeholder="ভিডিও খুঁজুন..." type="text">
        </div>

        <div class="category-scroll" id="categoryBar">
            <button class="cat-btn active" onclick="selectCategory('All')">All</button>
        </div>

        <div class="video-grid" id="videoGrid"></div>
    </div>

    <!-- ================= PLAYER VIEW ================= -->
    <div id="player-view">
        <div class="back-btn" onclick="closePlayer()">⬅ ফিরে যান</div>
        
        <div class="player-wrapper">
            <div class="player-container" id="videoPlayerContainer"></div>
            
            <div class="ad-overlay" id="midRollAdOverlay">
                <div class="ad-box">
                    <h3>📢 Ad Break</h3>
                    <p>ভিডিওটি দেখতে নিচের বাটনে ক্লিক করুন</p>
                    <button onclick="continueVideo()">ক্লিক করুন ⏵</button>
                </div>
            </div>
        </div>

        <!-- 🚀 আনলক বাটন সেকশন -->
        <div id="unlockSystem" style="display: none; padding: 15px 15px 5px 15px; background: #1a1a24; border-bottom: 1px solid #222;">
            <div style="font-size: 13px; color: #aaa; margin-bottom: 8px;">🔓 ফুল ভিডিও দেখতে আনলক করুন:</div>
            <button class="unlock-btn" id="unlockBtn" onclick="startAdChain()">🔒 ফুল কালেকশন (<span id="adCount">0</span>/<span id="targetAds">0</span>)</button>
        </div>

        <!-- ভিডিও ডিটেইলস -->
        <div class="video-details">
            <div class="title-row" id="playTitle">Video Title</div>
            <div class="stats-row">👁 <span id="playViews">0</span> Views • 📁 <span id="playCategory">Category</span></div>
            
            <div class="btn-group">
                <button class="action-btn" onclick="likeVideo()">👍 <span id="playLikes">0</span></button>
                <button class="action-btn">👎</button>
                <button class="action-btn">💬 <span id="playComments">0</span></button>
                <button class="action-btn" onclick="shareVideo()">🔗 Share</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ আপনার Firebase Config এখানে দিন
        const firebaseConfig = {
            apiKey: "AIzaSyCuIod3fHmhXNlNDj9DD41pjBYhlkihxAU",
            authDomain: "streamx-c6be1.firebaseapp.com",
            databaseURL: "https://streamx-c6be1-default-rtdb.firebaseio.com",
            projectId: "streamx-c6be1",
            storageBucket: "streamx-c6be1.firebasestorage.app",
            messagingSenderId: "1048225737752",
            appId: "1:1048225737752:web:2e7c9497f6a72f4d17676d",
            measurementId: "G-3GTPKD05Q1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allVideos = [];
        let currentCategory = 'All';
        let currentlyPlayingId = null;
        let currentVideoData = null;
        let adsWatched = 0;
        let globalDirectLink = ""; 
        let globalMidRollTimes = [];
        let shownAds = [];
        let globalMonetagId = "11167129"; // Default ID set

        // IDLE AD SYSTEM (Direct Link Backup)
        let idleTime = 0;
        let idleAdReady = false;

        setInterval(function() {
            idleTime++;
            if (idleTime >= 15 && globalDirectLink !== "") { idleAdReady = true; }
        }, 1000);

        function resetIdleTime() { if (!idleAdReady) idleTime = 0; }
        window.addEventListener('mousemove', resetIdleTime);
        window.addEventListener('keypress', resetIdleTime);
        window.addEventListener('scroll', resetIdleTime);
        window.addEventListener('touchstart', resetIdleTime);

        document.addEventListener('click', function() {
            if (idleAdReady && globalDirectLink !== "") {
                window.open(globalDirectLink, '_blank'); 
                idleAdReady = false; 
                idleTime = 0; 
            }
        });

        // DATA FETCHING & UI
        let sessionId = Date.now() + Math.random().toString(36).substr(2, 9);
        let amOnline = db.ref('.info/connected');
        let userRef = db.ref('analytics/live_users/' + sessionId);
        amOnline.on('value', snap => { if (snap.val()) { userRef.onDisconnect().remove(); userRef.set(true); } });
        db.ref('analytics/live_users').on('value', snap => document.getElementById('liveUsers').innerText = snap.numChildren());

        db.ref('settings').once('value', snap => {
            if(snap.val()) {
                let data = snap.val();
                if(data.siteName) {
                    document.getElementById('siteLogo').innerText = data.siteName;
                    document.title = data.siteName;
                }
                if(data.directAdLink) globalDirectLink = data.directAdLink;
                if(data.midRollTime) {
                    globalMidRollTimes = data.midRollTime.split(',').map(t => parseInt(t.trim())).filter(t => !isNaN(t));
                }
                if(data.monetagId) globalMonetagId = data.monetagId;
            }
        });

        db.ref('categories').on('value', snap => {
            let html = '<button class="cat-btn active" id="cat-All" onclick="selectCategory(\'All\')">All</button>';
            snap.forEach(child => {
                let cat = child.val().name;
                html += '<button class="cat-btn" id="cat-' + cat + '" onclick="selectCategory(\'' + cat + '\')">' + cat + '</button>';
            });
            document.getElementById('categoryBar').innerHTML = html;
        });

        db.ref('videos').on('value', snap => {
            allVideos = [];
            snap.forEach(child => { allVideos.push(Object.assign({ id: child.key }, child.val())); });
            allVideos.reverse(); 
            renderVideos(allVideos);
        });

        function renderVideos(videos) {
            let html = '';
            videos.forEach(vid => {
                let isLocked = (vid.unlockLink && vid.unlockLink.trim() !== '') ? '<div class="locked-badge">🔒 Locked</div>' : '';
                let thumbUrl = (vid.thumb && vid.thumb.trim() !== '') ? vid.thumb : 'https://via.placeholder.com/600x340?text=No+Thumbnail';
                
                html += '<div class="video-card" onclick="openPlayer(\'' + vid.id + '\')">' +
                            '<div class="thumb-container"><img src="' + thumbUrl + '" alt="Thumbnail"/>' + isLocked + '</div>' +
                            '<div class="card-info">' +
                                '<div class="card-title">' + (vid.title || 'Untitled') + '</div>' +
                                '<div class="card-stats"><span>👁 ' + (vid.views || 0) + '</span><span>👍 ' + (vid.likes || 0) + '</span></div>' +
                            '</div></div>';
            });
            document.getElementById('videoGrid').innerHTML = html || '<p style="text-align:center; padding: 20px; color: gray;">কোনো ভিডিও পাওয়া যায়নি!</p>';
        }

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            filterVideos();
        }

        function filterVideos() {
            let searchText = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allVideos.filter(vid => {
                let matchesSearch = vid.title.toLowerCase().includes(searchText);
                let matchesCat = (currentCategory === 'All') || (vid.category === currentCategory);
                return matchesSearch && matchesCat;
            });
            renderVideos(filtered);
        }

        function openPlayer(videoId) {
            let vid = allVideos.find(v => v.id === videoId);
            if(!vid) return;

            currentlyPlayingId = videoId;
            currentVideoData = vid;
            adsWatched = 0;
            shownAds = []; 
            isAdLoading = false;
            document.getElementById('midRollAdOverlay').style.display = 'none';

            db.ref('videos/' + videoId + '/views').set(firebase.database.ServerValue.increment(1));
            db.ref('analytics/total_views').set(firebase.database.ServerValue.increment(1));

            let playerHtml = '';
            let vUrl = vid.videoUrl || ''; 
            
            let thumbUrl = (vid.thumb && vid.thumb.trim() !== '') ? vid.thumb : 'https://via.placeholder.com/600x340?text=No+Thumbnail';
            
            if(vUrl.includes('youtube.com') || vUrl.includes('youtu.be')) {
                let ytId = vUrl.split('v=')[1] || vUrl.split('youtu.be/')[1] || '';
                ytId = ytId.split('\x26')[0]; 
                playerHtml = '<iframe id="mainVideo" src="https://www.youtube.com/embed/' + ytId + '?autoplay=1" allowfullscreen="allowfullscreen"></iframe>';
            } else if (vUrl !== '') {
                playerHtml = '<video id="mainVideo" controls="controls" autoplay="autoplay" controlsList="nodownload" oncontextmenu="return false;" style="pointer-events: auto;"><source src="' + vUrl + '" type="video/mp4"/></video>';
            } else {
                playerHtml = '<img src="' + thumbUrl + '" style="width: 100%; height: 100%; object-fit: contain; background: #000;" alt="Thumbnail"/>';
            }
            
            document.getElementById('videoPlayerContainer').innerHTML = playerHtml;

            let videoEl = document.getElementById('mainVideo');
            if(videoEl && videoEl.tagName === 'VIDEO') {
                videoEl.addEventListener('timeupdate', function() {
                    let currentTime = Math.floor(videoEl.currentTime);
                    if (globalMidRollTimes && globalMidRollTimes.includes(currentTime) && !shownAds.includes(currentTime)) {
                        videoEl.pause();
                        shownAds.push(currentTime);
                        document.getElementById('midRollAdOverlay').style.display = 'flex';
                    }
                });
            }

            document.getElementById('playTitle').innerText = vid.title || 'Untitled';
            document.getElementById('playViews').innerText = (vid.views || 0) + 1;
            document.getElementById('playCategory').innerText = vid.category || 'N/A';
            document.getElementById('playLikes').innerText = vid.likes || 0;
            document.getElementById('playComments').innerText = vid.comments || 0;

            let unlockDiv = document.getElementById('unlockSystem');
            let unlockBtn = document.getElementById('unlockBtn');

            if(vid.unlockLink && vid.unlockLink.trim() !== '' && vid.adTarget > 0) {
                unlockDiv.style.display = 'block';
                unlockBtn.innerHTML = '🔒 ফুল কালেকশন (<span id="adCount">0</span>/<span id="targetAds">' + vid.adTarget + '</span>)';
                unlockBtn.style.background = '#f39c12';
                unlockBtn.style.color = '#fff';
                unlockBtn.disabled = false;
            } else {
                unlockDiv.style.display = 'none';
            }

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closePlayer() {
            document.getElementById('videoPlayerContainer').innerHTML = ''; 
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        function continueVideo() {
            if(globalDirectLink) { window.open(globalDirectLink, '_blank'); }
            document.getElementById('midRollAdOverlay').style.display = 'none';
            let videoEl = document.getElementById('mainVideo');
            if(videoEl && typeof videoEl.play === 'function') videoEl.play();
        }

        function likeVideo() {
            if(!currentlyPlayingId) return;
            db.ref('videos/' + currentlyPlayingId + '/likes').set(firebase.database.ServerValue.increment(1));
            let currentLikes = parseInt(document.getElementById('playLikes').innerText);
            document.getElementById('playLikes').innerText = currentLikes + 1;
        }

        function shareVideo() {
            if (navigator.share) { navigator.share({ title: currentVideoData.title, url: window.location.href }); } 
            else { alert("Share feature not supported on this browser."); }
        }

        // ==========================================
        // 💬 MULTI-AD LOGIC (AdsGram -> তারপর Monetag -> তারপর 5s Cooldown)
        // ==========================================
        
        let isAdLoading = false; 

        function startAdChain() {
            if(!currentVideoData || isAdLoading) return;

            if (adsWatched >= parseInt(currentVideoData.adTarget)) {
                if(currentVideoData.unlockLink) {
                    window.open(currentVideoData.unlockLink, '_blank');
                }
                return;
            }

            isAdLoading = true; 
            let unlockBtn = document.getElementById('unlockBtn');
            unlockBtn.innerHTML = "⏳ অ্যাড লোড হচ্ছে...";
            unlockBtn.style.background = "#555";
            unlockBtn.disabled = true;

            db.ref('analytics/total_clicks').set(firebase.database.ServerValue.increment(1));

            playAdsGram().then(() => {
                triggerMonetagRewardedAd();
            });
        }

        function playAdsGram() {
            return new Promise((resolve) => {
                if (window.Adsgram) {
                    try {
                        const AdController = window.Adsgram.init({ blockId: "35555" }); 
                        AdController.show().then(() => {
                            resolve(); 
                        }).catch((err) => {
                            console.warn("AdsGram Error/No Ad:", err);
                            resolve(); 
                        });
                    } catch(e) {
                        resolve();
                    }
                } else {
                    resolve(); 
                }
            });
        }

        function triggerMonetagRewardedAd() {
            let unlockBtn = document.getElementById('unlockBtn');
            unlockBtn.innerHTML = "⏳ Monetag লোড হচ্ছে...";
            
            // Fixed the variable reference to safely call Monetag
            let monetagFunc = window['show_' + globalMonetagId]; 
            
            if (typeof monetagFunc === 'function') {
                try {
                    monetagFunc().then(() => {
                        processRewardWithCooldown(); 
                    }).catch((err) => {
                        fallbackToDirectLink(); 
                    });
                } catch(e) { 
                    fallbackToDirectLink(); 
                }
            } else { 
                fallbackToDirectLink(); 
            } 
        }

        function fallbackToDirectLink() {
            if(globalDirectLink && globalDirectLink.trim() !== '') {
                window.open(globalDirectLink, '_blank');
            }
            processRewardWithCooldown(); 
        }

        function processRewardWithCooldown() {
            adsWatched++;
            let target = parseInt(currentVideoData.adTarget);
            let unlockBtn = document.getElementById('unlockBtn');
            
            if(adsWatched >= target) {
                unlockBtn.innerHTML = "📥 ফুল ভিডিও দেখুন / ডাউনলোড করুন";
                unlockBtn.style.background = "#00e676";
                unlockBtn.style.color = "#000";
                unlockBtn.disabled = false; 
                isAdLoading = false; 
            } else {
                let timeLeft = 1; // Updated to 1 as per your previous code adjustment
                unlockBtn.innerHTML = '⏳ অপেক্ষা করুন (' + timeLeft + 's)';
                
                let timer = setInterval(() => {
                    timeLeft--;
                    unlockBtn.innerHTML = '⏳ অপেক্ষা করুন (' + timeLeft + 's)';
                    
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        unlockBtn.innerHTML = '🔒 ফুল কালেকশন (<span id="adCount">' + adsWatched + '</span>/<span id="targetAds">' + target + '</span>)';
                        unlockBtn.style.background = '#f39c12';
                        unlockBtn.disabled = false;
                        isAdLoading = false; 
                    }
                }, 1000); 
            }
        }
    </script>

</body>
